<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navi Mumbai Kalamboli Congregation Dashboard</title>
    <style>
        :root {
            --bg-color: #f3f4f6;
            --sidebar-bg: #111827;
            --sidebar-hover: #1f2937;
            --accent: #3b82f6;
            --text-main: #111827;
            --text-muted: #6b7280;
            --card-bg: #ffffff;
            --success: #107c41; 
        }

        /* --- BASE RESET --- */
        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR OVERLAY (HIDDEN ON DESKTOP) --- */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 90;
            backdrop-filter: blur(2px);
            transition: opacity 0.3s ease;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 280px; 
            background-color: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 15px rgba(0,0,0,0.15);
            overflow-y: auto; 
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .sidebar h2 {
            margin: 0;
            font-size: 1.05rem; 
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.4;
        }

        /* Close button inside sidebar (mobile only) */
        .close-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .nav-group {
            padding: 15px 24px 8px 24px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #9ca3af;
            letter-spacing: 1px;
            font-weight: 700;
            margin-top: 5px;
        }
        
        .nav-item {
            padding: 12px 24px 12px 34px; 
            color: #d1d5db;
            text-decoration: none;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
        }
        
        .nav-item.active, .nav-item:hover {
            background-color: var(--sidebar-hover);
            border-left: 4px solid var(--accent);
            color: white;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: calc(100% - 280px);
            overflow: hidden;
        }
